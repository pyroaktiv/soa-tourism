syntax = "proto3";

package tourism.stakeholders.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option java_multiple_files = true;
option java_package = "tourism.stakeholders.v1";

option go_package = "github.com/pyroaktiv/soa-tourism/gateway/gen/go/tourism/stakeholders/v1;stakeholdersv1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Stakeholders API";
    version: "0.1.0";
    description: "User profile management service";
  };
  schemes: HTTP;
  schemes: HTTPS;
  consumes: "application/json";
  produces: "application/json";
};

// StakeholderService manages user profiles.
service StakeholderService {
  // GetProfile returns the profile for the given user.
  rpc GetProfile(GetProfileRequest) returns (Profile) {
    option (google.api.http) = {
      get: "/api/v1/stakeholders/profiles/{user_id}"
    };
  }

  // UpdateProfile creates or updates the authenticated user's profile.
  // Requires authnz.
  rpc UpdateProfile(UpdateProfileRequest) returns (Profile) {
    option (google.api.http) = {
      put: "/api/v1/stakeholders/profiles/{user_id}"
      body: "*"
    };
  }

  // DeleteProfilePhoto removes the profile photo from storage and clears the URL.
  // Requires authnz.
  rpc DeleteProfilePhoto(DeleteProfilePhotoRequest) returns (Profile) {
    option (google.api.http) = {
      delete: "/api/v1/stakeholders/profiles/{user_id}/photo"
    };
  }
}

// Profile holds all public profile fields for a user.
message Profile {
  string user_id   = 1;
  string name      = 2;
  string surname   = 3;
  string bio       = 4;
  string motto     = 5;
  // photo_url is empty when no photo has been uploaded.
  string photo_url = 6;
}

message GetProfileRequest {
  string user_id = 1;
}

// UpdateProfileRequest supports partial updates — only fields that are
// explicitly set (via proto3 optional) will be written to the database.
message UpdateProfileRequest {
  string user_id           = 1;
  optional string name     = 2;
  optional string surname  = 3;
  optional string bio      = 4;
  optional string motto    = 5;
  // photo_url should be the full Filer URL returned after a direct upload to SeaweedFS.
  optional string photo_url = 6;
}

message DeleteProfilePhotoRequest {
  string user_id = 1;
}
