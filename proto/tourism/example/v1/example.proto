syntax = "proto3";

package tourism.example.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/pyroaktiv/soa-tourism/gateway/gen/go/tourism/example/v1;examplev1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Gateway API";
    version: "0.1.0";
    description: "REST-to-gRPC gateway";
  };
  schemes: HTTP;
  schemes: HTTPS;
  consumes: "application/json";
  produces: "application/json";
};

// HealthService provides a liveness check for the gateway.
service HealthService {
  // Check returns 200 OK when the gateway is running.
  rpc Check(CheckRequest) returns (CheckResponse) {
    option (google.api.http) = {
      get: "/api/v1/health"
    };
  }
}

message CheckRequest {}

message CheckResponse {
  // status is "ok" when healthy.
  string status = 1;
}