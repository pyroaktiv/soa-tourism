version: v2
inputs:
  - directory: ../proto
plugins:
  # Generates *.pb.go — message and enum types
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  # Generates *_grpc.pb.go — gRPC client and server interfaces
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative

  # Generates *.gw.pb.go — HTTP↔gRPC reverse-proxy registration
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt:
      - paths=source_relative

  # Generates *.swagger.json — OpenAPI v2 spec (served at /swagger/)
  - local: protoc-gen-openapiv2
    out: api/swagger
