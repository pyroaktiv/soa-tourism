version: v2
inputs:
  - proto_file: ../proto/tourism/auth/v1/auth.proto
plugins:
  # Generates *.pb.go — message and enum types
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative

  # Generates *_grpc.pb.go — gRPC server and client interfaces
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
