services:
  example-service:
    build:
      context: ./example-service
      dockerfile: Dockerfile
    environment:
      GRPC_ADDR: "0.0.0.0:9090"
    expose:
      - "9090"

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      EXAMPLE_SERVICE_ADDR: "example-service:9090"
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      - example-service
