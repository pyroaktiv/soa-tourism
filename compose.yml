services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    environment:
      GRPC_ADDR: "0.0.0.0:9090"
      JWT_SECRET: "change-me"
      ACCESS_TOKEN_DURATION: "1h"
      REFRESH_TOKEN_DURATION: "168h"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "authdb"
    expose:
      - "9090"
    depends_on:
      - mongo

  example-service:
    build:
      context: ./example-service
      dockerfile: Dockerfile
    environment:
      GRPC_ADDR: "0.0.0.0:9090"
    expose:
      - "9090"

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      EXAMPLE_SERVICE_ADDR: "example-service:9090"
      AUTH_SERVICE_ADDR: "auth-service:9090"
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      - example-service
      - auth-service

volumes:
  mongo_data:
