syntax = "proto3";

package tourism.auth.v1;

option java_multiple_files = true;
option java_package = "tourism.auth.v1";
option go_package = "github.com/pyroaktiv/soa-tourism/auth-service/gen/go/tourism/auth/v1;authv1";

service AuthService {
  rpc Validate(ValidateRequest) returns (ValidateResponse) {}
}

message User {
  string id       = 1;
  string username = 2;
  string email    = 3;
  repeated string roles = 4;
  bool blocked = 5;
}

message ValidateRequest {
  string access_token = 1;
}

message ValidateResponse {
  bool valid = 1;
  User user = 2;
}